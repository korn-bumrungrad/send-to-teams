<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Send Message to Team</title>
</head>

<body style="font-family:Arial; max-width:400px; margin:40px auto">

<h3>Contact Our Team</h3>

<input id="name" placeholder="Your name" style="width:100%; padding:8px"><br><br>
<textarea id="message" placeholder="Your message" rows="5" style="width:100%; padding:8px"></textarea><br><br>

<button onclick="sendToTeams()">Send</button>

<script>
/* ✅ MUST be global */
function sendToTeams() {
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  if (!name || !message) {
    alert("Please fill in all fields");
    return;
  }

  fetch("https://defaultd0da78d29a7d40818d00014d1fad64.bb.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/2e8de73df09d4c1dac1965912d15b3ed/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=k-IouKUHylTLKAsHRV8w-GUFqxvA3BcB5eKRIMmhYAM", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      sender: name,
      message: message
    })
  })
  .then(() => alert("Message sent"))
  .catch(err => {
    console.error(err);
    alert("Error sending message");
  });
}
</script>

</body>
</html>
